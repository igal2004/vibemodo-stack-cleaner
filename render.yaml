services:
  - type: web
    name: vibemodo-stack-cleaner
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/config
    envVars:
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: RENDER_APP_URL
        sync: false
      - key: SHOPIFY_DEV_STORE_DOMAIN
        value: vibemodo-seo-test.myshopify.com
      - key: DEV_STORE_DOMAIN
        value: vibemodo-seo-test.myshopify.com
      - key: SHOPIFY_SHOP_DOMAIN
        sync: false
      - key: SHOPIFY_ADMIN_ACCESS_TOKEN
        sync: false
      - key: SHOPIFY_API_VERSION
        value: "2026-01"
      - key: SHOPIFY_REQUIRED_SCOPES
        value: "read_themes,read_apps"
      - key: SHOPIFY_SCOPES
        value: "read_themes,read_apps"
      - key: SHOPIFY_THEME_ID
        sync: false
      - key: STOREFRONT_URL
        sync: false
      - key: INSTALLED_APP_SIGNATURES_JSON
        sync: false
      - key: BACKUP_DIR
        value: /data/backups
      - key: SCAN_RATE_LIMIT_MS
        value: "650"
      - key: PORT
        value: "3000"
    disk:
      name: stack-cleaner-backups
      mountPath: /data
      sizeGB: 1
